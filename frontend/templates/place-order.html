<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order - Grocery Finance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px 0;
        }
        
        .container-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #667eea;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header p {
            color: #666;
            margin: 10px 0 0 0;
            font-size: 14px;
        }
        
        .content-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .products-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        
        .section-title {
            color: #333;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 12px;
        }
        
        .search-bar {
            margin-bottom: 20px;
        }
        
        .search-bar input {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
        }
        
        .search-bar input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .product-card {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .product-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }
        
        .product-card.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        
        .product-name {
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .product-price {
            color: #667eea;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .product-stock {
            color: #999;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .qty-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 5px;
            border-radius: 6px;
        }
        
        .qty-btn {
            background: #667eea;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .qty-btn:hover {
            background: #764ba2;
        }
        
        .qty-input {
            width: 40px;
            text-align: center;
            border: none;
            background: white;
            font-weight: 700;
        }
        
        .order-summary {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            height: fit-content;
            position: sticky;
            top: 90px;
        }
        
        .cart-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
            font-size: 13px;
        }
        
        .cart-item-name {
            font-weight: 700;
            color: #333;
            flex: 1;
        }
        
        .cart-item-price {
            color: #667eea;
            font-weight: 700;
            min-width: 70px;
            text-align: right;
        }
        
        .remove-item {
            color: #cc3333;
            cursor: pointer;
            margin-left: 8px;
            font-size: 12px;
        }
        
        .summary-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: #666;
            font-size: 13px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            color: #333;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .checkout-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            color: #333;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
            font-size: 13px;
        }
        
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
        }
        
        .form-control:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .empty-cart {
            text-align: center;
            color: #999;
            padding: 20px 0;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }
        
        @media (max-width: 768px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }
            
            .order-summary {
                position: static;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif !important; background: transparent !important; }
        body::before {
            content: ''; position: fixed; top: -20px; left: -20px; right: -20px; bottom: -20px;
            background: url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1920') center/cover no-repeat;
            filter: blur(12px) brightness(0.7); z-index: -10;
        }
        .container, .container-fluid, .container-main, .card, .stat-card, .section, .header, .sidebar, .metric-card {
            background: rgba(255, 255, 255, 0.88) !important;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15) !important;
            border-radius: 12px !important;
        }
        .header h1, h2 i, .stat-value, .metric-value { color: #2874f0 !important; }
        .btn-primary-custom, .btn-primary, .btn-submit, .btn-edit { background: #fb641b !important; color: white !important; border: none !important; box-shadow: 0 4px 10px rgba(251,100,27,0.3) !important; }
        .btn-primary-custom:hover, .btn-primary:hover, .btn-submit:hover, .btn-edit:hover { background: #e05814 !important; transform: translateY(-2px); }
        .navbar { background: rgba(40, 116, 240, 0.9) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.2) !important; }
        .nav-link { color: #555 !important; font-weight: 500 !important; }
        .nav-link.active { background-color: rgba(40, 116, 240, 0.1) !important; border-left-color: #2874f0 !important; color: #2874f0 !important; border-radius: 0 8px 8px 0; }
        .nav-link:hover { color: #2874f0 !important; }
        table thead th { background: rgba(40, 116, 240, 0.1) !important; color: #2874f0 !important; border-bottom: 2px solid #2874f0 !important; }
        .navbar-brand { color: #fff !important; }
        .text-light { color: #fff !important; }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="header">
            <h1><i class="bi bi-cart-plus"></i> Place New Order</h1>
            <p>Select products and enter delivery details to create your order</p>
        </div>

        <div class="content-wrapper">
            <!-- Products Selection -->
            <div class="products-section">
                <div class="section-title">
                    <i class="bi bi-box"></i> Available Products
                </div>
                
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search products...">
                </div>

                <div id="productsContainer" class="products-grid">
                    <div class="loading">Loading products...</div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="order-summary">
                <div class="section-title">
                    <i class="bi bi-receipt"></i> Order Summary
                </div>
                
                <div id="cartContainer" class="cart-items">
                    <div class="empty-cart">Your cart is empty</div>
                </div>

                <div class="summary-line">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-line">
                    <span>Tax (10%):</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>

                <button class="btn-submit" id="viewCheckoutBtn" onclick="scrollToCheckout()" disabled>
                    Proceed to Checkout →
                </button>
            </div>
        </div>

        <!-- Checkout Section -->
        <div class="checkout-section">
            <div class="section-title">
                <i class="bi bi-credit-card"></i> Delivery Details
            </div>

            <div id="successAlert" class="alert-success"></div>
            <div id="errorAlert" class="alert-error"></div>

            <form id="orderForm">
                <div class="form-group">
                    <label class="form-label">Shipping Address *</label>
                    <textarea 
                        id="shippingAddress" 
                        class="form-control" 
                        placeholder="Enter your complete delivery address..."
                        required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Additional Notes</label>
                    <textarea 
                        id="notes" 
                        class="form-control" 
                        placeholder="Any special delivery instructions..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn" disabled>
                    <i class="bi bi-check-circle"></i> Place Order
                </button>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        let products = [];
        let cart = {};
        let currentCustomerId = 2; // john_retail customer ID

        // Load products on page load
        async function loadProducts() {
            try {
                const response = await fetch('http://localhost:8000/api/products/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Failed to load products');
                
                products = await response.json();
                displayProducts(products);
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsContainer').innerHTML = 
                    '<div class="alert alert-danger">Failed to load products</div>';
            }
        }

        function displayProducts(productsToShow) {
            const container = document.getElementById('productsContainer');
            
            if (productsToShow.length === 0) {
                container.innerHTML = '<div class="empty-cart">No products found</div>';
                return;
            }

            container.innerHTML = productsToShow.map(product => `
                <div class="product-card ${cart[product.id] ? 'selected' : ''}" data-product-id="${product.id}">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">$${product.retail_price.toFixed(2)}</div>
                    <div class="product-stock">Stock: ${product.quantity_in_stock}</div>
                    <div class="qty-control">
                        <button type="button" class="qty-btn" onclick="decreaseQty(${product.id})">−</button>
                        <input type="text" class="qty-input" id="qty-${product.id}" value="${cart[product.id] || 0}" readonly>
                        <button type="button" class="qty-btn" onclick="increaseQty(${product.id}, ${product.quantity_in_stock})">+</button>
                    </div>
                </div>
            `).join('');
        }

        function increaseQty(productId, stock) {
            const currentQty = parseInt(document.getElementById(`qty-${productId}`).value) || 0;
            if (currentQty < stock) {
                const product = products.find(p => p.id === productId);
                cart[productId] = currentQty + 1;
                document.getElementById(`qty-${productId}`).value = cart[productId];
                document.querySelector(`[data-product-id="${productId}"]`).classList.add('selected');
                updateSummary();
            }
        }

        function decreaseQty(productId) {
            const currentQty = parseInt(document.getElementById(`qty-${productId}`).value) || 0;
            if (currentQty > 0) {
                cart[productId] = currentQty - 1;
                document.getElementById(`qty-${productId}`).value = cart[productId];
                
                if (cart[productId] === 0) {
                    delete cart[productId];
                    document.querySelector(`[data-product-id="${productId}"]`).classList.remove('selected');
                }
                updateSummary();
            }
        }

        function updateSummary() {
            const cartContainer = document.getElementById('cartContainer');
            const cartItems = Object.keys(cart)
                .filter(productId => cart[productId] > 0)
                .map(productId => {
                    const product = products.find(p => p.id === parseInt(productId));
                    const subtotal = product.retail_price * cart[productId];
                    return {
                        productId,
                        product,
                        quantity: cart[productId],
                        subtotal
                    };
                });

            if (cartItems.length === 0) {
                cartContainer.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
                document.getElementById('viewCheckoutBtn').disabled = true;
                document.getElementById('submitBtn').disabled = true;
            } else {
                cartContainer.innerHTML = cartItems.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-name">${item.product.name} × ${item.quantity}</div>
                        <div class="cart-item-price">$${item.subtotal.toFixed(2)}</div>
                        <span class="remove-item" onclick="removeFromCart(${item.productId})">✕</span>
                    </div>
                `).join('');
                document.getElementById('viewCheckoutBtn').disabled = false;
                document.getElementById('submitBtn').disabled = false;
            }

            // Calculate totals
            const subtotal = cartItems.reduce((sum, item) => sum + item.subtotal, 0);
            const tax = subtotal * 0.10;
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
        }

        function removeFromCart(productId) {
            delete cart[productId];
            document.getElementById(`qty-${productId}`).value = 0;
            document.querySelector(`[data-product-id="${productId}"]`).classList.remove('selected');
            updateSummary();
        }

        function scrollToCheckout() {
            document.querySelector('.checkout-section').scrollIntoView({ behavior: 'smooth' });
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(searchTerm)
            );
            displayProducts(filtered);
        });

        // Submit order
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const cartItems = Object.keys(cart)
                .filter(productId => cart[productId] > 0)
                .map(productId => ({
                    product_id: parseInt(productId),
                    quantity: cart[productId]
                }));

            if (cartItems.length === 0) {
                showError('Please add items to your cart');
                return;
            }

            const shippingAddress = document.getElementById('shippingAddress').value;
            if (!shippingAddress.trim()) {
                showError('Please enter a shipping address');
                return;
            }

            try {
                const response = await fetch('http://localhost:8000/api/orders/', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        customer_id: currentCustomerId,
                        items: cartItems,
                        shipping_address: shippingAddress
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to create order');
                }

                const result = await response.json();
                showSuccess(`Order #${result.id} created successfully! Total: $${result.total_amount.toFixed(2)}`);
                
                // Reset form
                setTimeout(() => {
                    cart = {};
                    document.getElementById('orderForm').reset();
                    loadProducts();
                    updateSummary();
                    window.scrollTo(0, 0);
                }, 2000);
            } catch (error) {
                showError(error.message);
            }
        });

        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            alert.textContent = '✓ ' + message;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        function showError(message) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = '✗ ' + message;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        // Load products on page load
        window.addEventListener('load', loadProducts);
    </script>
</body>
</html>
