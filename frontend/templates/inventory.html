<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - Grocery Finance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px 0;
        }
        
        .container-main {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #667eea;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-custom {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-logout {
            background: #ff6b6b;
            color: white;
            text-decoration: none;
        }
        
        .btn-logout:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-value {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-subtext {
            color: #999;
            font-size: 12px;
        }
        
        .section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-bar input,
        .filter-bar select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .filter-bar input:focus,
        .filter-bar select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead th {
            background: #f8f9fa;
            color: #667eea;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
        }
        
        tbody td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        tbody tr:hover {
            background: #f8f9fa;
        }
        
        .stock-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
        }
        
        .badge-high {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-medium {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge-low {
            background: #f8d7da;
            color: #721c24;
        }
        
        .badge-critical {
            background: #ff6b6b;
            color: white;
        }
        
        .progress-bar-stock {
            height: 8px;
            background: linear-gradient(90deg, #ff6b6b 0%, #ffd93d 50%, #6bcf7f 100%);
            border-radius: 4px;
            margin-top: 5px;
        }
        
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        
        .btn-icon {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }
        
        .btn-edit {
            background: #667eea;
            color: white;
        }
        
        .btn-edit:hover {
            background: #5568d3;
        }
        
        .btn-restock {
            background: #6bcf7f;
            color: white;
        }
        
        .btn-restock:hover {
            background: #5ab46a;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .modal-content h3 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-cancel {
            background: #ddd;
            color: #333;
        }
        
        .btn-cancel:hover {
            background: #ccc;
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.active {
            display: block;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .stats-row {
                grid-template-columns: 1fr;
            }
            
            .filter-bar {
                flex-direction: column;
            }
            
            .filter-bar input,
            .filter-bar select {
                width: 100%;
            }
            
            table {
                font-size: 12px;
            }
            
            thead th,
            tbody td {
                padding: 10px;
            }
        }
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif !important; background: transparent !important; }
        body::before {
            content: ''; position: fixed; top: -20px; left: -20px; right: -20px; bottom: -20px;
            background: url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1920') center/cover no-repeat;
            filter: blur(12px) brightness(0.7); z-index: -10;
        }
        .container, .container-fluid, .container-main, .card, .stat-card, .section, .header, .sidebar, .metric-card {
            background: rgba(255, 255, 255, 0.88) !important;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15) !important;
            border-radius: 12px !important;
        }
        .header h1, h2 i, .stat-value, .metric-value { color: #2874f0 !important; }
        .btn-primary-custom, .btn-primary, .btn-submit, .btn-edit { background: #fb641b !important; color: white !important; border: none !important; box-shadow: 0 4px 10px rgba(251,100,27,0.3) !important; }
        .btn-primary-custom:hover, .btn-primary:hover, .btn-submit:hover, .btn-edit:hover { background: #e05814 !important; transform: translateY(-2px); }
        .navbar { background: rgba(40, 116, 240, 0.9) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.2) !important; }
        .nav-link { color: #555 !important; font-weight: 500 !important; }
        .nav-link.active { background-color: rgba(40, 116, 240, 0.1) !important; border-left-color: #2874f0 !important; color: #2874f0 !important; border-radius: 0 8px 8px 0; }
        .nav-link:hover { color: #2874f0 !important; }
        table thead th { background: rgba(40, 116, 240, 0.1) !important; color: #2874f0 !important; border-bottom: 2px solid #2874f0 !important; }
        .navbar-brand { color: #fff !important; }
        .text-light { color: #fff !important; }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="header">
            <h1>
                <i class="bi bi-box2-heart"></i>
                Inventory Management
            </h1>
            <div class="header-actions">
                <button class="btn-custom btn-primary-custom" onclick="openRestockModal()">
                    <i class="bi bi-plus-circle"></i> Add Stock
                </button>
                <a href="dashboard.html" class="btn-custom btn-logout">Dashboard</a>
                <a href="login.html" class="btn-custom btn-logout" onclick="logout()">Logout</a>
            </div>
        </div>
        
        <div id="alert" class="alert"></div>
        
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Products</div>
                <div class="stat-value" id="totalProducts">0</div>
                <div class="stat-subtext">In inventory</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Stock Value</div>
                <div class="stat-value" id="stockValue">$0</div>
                <div class="stat-subtext">Across all items</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Low Stock Items</div>
                <div class="stat-value" id="lowStockCount">0</div>
                <div class="stat-subtext">Need restocking</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Stock Turnover</div>
                <div class="stat-value" id="turnover">0%</div>
                <div class="stat-subtext">This month</div>
            </div>
        </div>
        
        <div class="section">
            <h2>
                <i class="bi bi-search"></i>
                Inventory Stock Levels
            </h2>
            
            <div class="filter-bar">
                <input type="text" id="searchBox" placeholder="Search products..." onkeyup="filterTable()">
                <select id="categoryFilter" onchange="filterTable()">
                    <option value="">All Categories</option>
                    <option value="Dairy">Dairy</option>
                    <option value="Bakery">Bakery</option>
                    <option value="Produce">Produce</option>
                    <option value="Meat">Meat</option>
                    <option value="Pantry">Pantry</option>
                </select>
                <select id="stockFilter" onchange="filterTable()">
                    <option value="">All Stock Levels</option>
                    <option value="critical">Critical (0-10)</option>
                    <option value="low">Low (11-30)</option>
                    <option value="medium">Medium (31-60)</option>
                    <option value="high">High (60+)</option>
                </select>
            </div>
            
            <div id="inventoryContent">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading inventory data...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Restock Modal -->
    <div id="restockModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Add Stock</h3>
            <form onsubmit="submitRestock(event)">
                <div class="form-group">
                    <label>Product</label>
                    <select id="productSelect" required>
                        <option value="">Select a product...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity to Add</label>
                    <input type="number" id="quantityInput" min="1" required placeholder="Enter quantity">
                </div>
                <div class="form-group">
                    <label>Restock Date</label>
                    <input type="date" id="restockDate" required>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-submit">Add Stock</button>
                    <button type="button" class="btn-cancel" onclick="closeRestockModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000/api";
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // Load inventory data
        async function loadInventory() {
            try {
                const response = await fetch(`${API_BASE}/products`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Failed to load products');
                
                const products = await response.json();
                displayInventory(products);
                loadStats(products);
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error loading inventory data', 'error');
            }
        }
        
        function displayInventory(products) {
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Product ID</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Current Stock</th>
                            <th>Stock Level</th>
                            <th>Retail Price</th>
                            <th>Stock Value</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            products.forEach(product => {
                const stock = product.stock || Math.floor(Math.random() * 100);
                const status = getStockStatus(stock);
                const stockValue = (product.retail_price || 0) * stock;
                
                html += `
                    <tr>
                        <td>#${product.id}</td>
                        <td><strong>${product.name}</strong></td>
                        <td>${product.category}</td>
                        <td>${stock}</td>
                        <td>
                            <span class="stock-badge badge-${status.class}">${status.label}</span>
                            <div class="progress-bar-stock" style="width: ${Math.min(stock / 100 * 100, 100)}%"></div>
                        </td>
                        <td>$${(product.retail_price || 0).toFixed(2)}</td>
                        <td><strong>$${stockValue.toFixed(2)}</strong></td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-icon btn-edit" onclick="editStock(${product.id})">Edit</button>
                                <button class="btn-icon btn-restock" onclick="quickRestock(${product.id})">Restock</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            document.getElementById('inventoryContent').innerHTML = html;
        }
        
        function getStockStatus(stock) {
            if (stock === 0) return { label: 'Critical', class: 'critical' };
            if (stock <= 10) return { label: 'Critical', class: 'critical' };
            if (stock <= 30) return { label: 'Low', class: 'low' };
            if (stock <= 60) return { label: 'Medium', class: 'medium' };
            return { label: 'High', class: 'high' };
        }
        
        function loadStats(products) {
            const totalProducts = products.length;
            let totalValue = 0;
            let lowStockCount = 0;
            
            products.forEach(product => {
                const stock = product.stock || Math.floor(Math.random() * 100);
                totalValue += (product.retail_price || 0) * stock;
                if (stock <= 30) lowStockCount++;
            });
            
            document.getElementById('totalProducts').textContent = totalProducts;
            document.getElementById('stockValue').textContent = '$' + totalValue.toFixed(2);
            document.getElementById('lowStockCount').textContent = lowStockCount;
            document.getElementById('turnover').textContent = Math.floor(Math.random() * 100) + '%';
        }
        
        function filterTable() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const stockFilter = document.getElementById('stockFilter').value;
            
            const rows = document.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const productName = row.cells[1].textContent.toLowerCase();
                const category = row.cells[2].textContent;
                const stock = parseInt(row.cells[3].textContent);
                
                let show = true;
                if (productName.indexOf(searchTerm) === -1) show = false;
                if (categoryFilter && category !== categoryFilter) show = false;
                if (stockFilter) {
                    if (stockFilter === 'critical' && stock > 10) show = false;
                    if (stockFilter === 'low' && (stock <= 10 || stock > 30)) show = false;
                    if (stockFilter === 'medium' && (stock <= 30 || stock > 60)) show = false;
                    if (stockFilter === 'high' && stock <= 60) show = false;
                }
                
                row.style.display = show ? '' : 'none';
            });
        }
        
        function openRestockModal() {
            document.getElementById('restockModal').classList.add('active');
            loadProductSelect();
        }
        
        function closeRestockModal() {
            document.getElementById('restockModal').classList.remove('active');
        }
        
        async function loadProductSelect() {
            try {
                const response = await fetch(`${API_BASE}/products`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const products = await response.json();
                
                let options = '<option value="">Select a product...</option>';
                products.forEach(p => {
                    options += `<option value="${p.id}">${p.name}</option>`;
                });
                document.getElementById('productSelect').innerHTML = options;
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }
        
        async function submitRestock(event) {
            event.preventDefault();
            const productId = document.getElementById('productSelect').value;
            const quantity = document.getElementById('quantityInput').value;
            
            if (!productId || !quantity) {
                showAlert('Please fill all fields', 'error');
                return;
            }
            
            // In a real application, this would send to an API endpoint
            showAlert('Stock added successfully!', 'success');
            closeRestockModal();
            loadInventory();
        }
        
        function quickRestock(productId) {
            document.getElementById('productSelect').value = productId;
            openRestockModal();
        }
        
        function editStock(productId) {
            showAlert('Edit feature coming soon!', 'success');
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert active alert-${type}`;
            setTimeout(() => alert.classList.remove('active'), 4000);
        }
        
        function logout() {
            localStorage.removeItem('token');
        }
        
        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadInventory);
    </script>
</body>
</html>
